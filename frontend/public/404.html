<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Redirecting...</title>
        <script>
            (function () {
                var l = window.location;
                var redirectUrl =
                    l.protocol +
                    '//' +
                    l.hostname +
                    (l.port ? ':' + l.port : '') +
                    '/?' +
                    l.pathname.slice(1).replace(/&/g, '~and~') +
                    (l.search
                        ? '&' + l.search.slice(1).replace(/&/g, '~and~')
                        : '') +
                    l.hash;

                l.replace(redirectUrl);
            })();
        </script>
    </head>
    <body></body>
</html>
