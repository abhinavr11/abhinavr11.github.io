<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Redirecting...</title>
        <script>
            (function () {
                var l = window.location;
                var pathParts = l.pathname.split('/').filter(Boolean);
                var pathSegmentsToKeep =
                    l.hostname.endsWith('.github.io') && pathParts.length > 0
                        ? 1
                        : 0;

                var keptPath = l.pathname
                    .split('/')
                    .slice(0, 1 + pathSegmentsToKeep)
                    .join('/');

                var routePath = l.pathname
                    .slice(1)
                    .split('/')
                    .slice(pathSegmentsToKeep)
                    .join('/');

                var redirectUrl =
                    l.protocol +
                    '//' +
                    l.hostname +
                    (l.port ? ':' + l.port : '') +
                    keptPath +
                    '/?' +
                    routePath.replace(/&/g, '~and~') +
                    (l.search
                        ? '&' + l.search.slice(1).replace(/&/g, '~and~')
                        : '') +
                    l.hash;

                l.replace(redirectUrl);
            })();
        </script>
    </head>
    <body></body>
</html>
